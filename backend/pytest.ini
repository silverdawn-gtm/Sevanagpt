[pytest]
testpaths = tests
markers =
    benchmark: performance/quality benchmarks; require a running backend on :8000 (deselected by default)
    integration: require a live PostgreSQL/pgvector database (deselected by default)
# Default run is fast and self-contained: unit + mocked tests only.
# Run the excluded suites explicitly, e.g.  pytest -m integration  /  pytest -m benchmark
addopts = -m "not benchmark and not integration" -p no:cacheprovider
